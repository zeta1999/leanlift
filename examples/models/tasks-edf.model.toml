# tasks-edf — EDF with CONSTRAINED deadlines (D < T), where the cheap U ≤ 1 test
# is NOT enough (PLAN-qnet-rta §E). Utilization U = 1/2 + 1/3 = 0.833 ≤ 1, so the
# naive check would pass — but both tasks have a deadline of 1, and at t=1 the
# processor demand is dbf(1) = C1 + C2 = 2 > 1, so EDF cannot meet them. The exact
# demand-bound test catches this; `lift model check examples/models/tasks-edf.model.toml`.
kind = "tasks"
policy = "EDF"

[[task]]
name = "fast"
c = "1"
t = "2"
d = "1"

[[task]]
name = "tight"
c = "1"
t = "3"
d = "1"
